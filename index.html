<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>레드버튼 오거나이징 가이드 (Firebase 마이그레이션)</title>
<style>
  :root{
    --bg: #F6F6F3;
    --surface: #FFFFFF;
    --ink: #1B1C1A;
    --ink-soft: #63645F;
    --line: #E3E3DE;
    --accent: #E4141B;
    --accent-soft: #FCE9E8;
    --danger: #B3492B;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Pretendard', 'Malgun Gothic', sans-serif;
    --mono: 'SFMono-Regular', Menlo, Consolas, 'Courier New', monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); line-height:1.5;}
  .login-gate{position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:200; padding:20px;}
  .login-gate-box{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:36px 32px; max-width:360px; width:100%; text-align:center; box-shadow:0 8px 30px rgba(0,0,0,.08);}
  .brand{font-weight:900; font-size:22px; letter-spacing:-0.03em; text-transform:uppercase; color:var(--accent); margin-bottom:16px;}
  .brand .r-mark{font-size:10px; vertical-align:super; margin-left:1px;}
  p{font-size:13px; color:var(--ink-soft); line-height:1.6; margin:0;}
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; border:none; border-radius:8px; padding:11px 18px; font-size:13.5px; font-weight:700; cursor:pointer; font-family:var(--sans); width:100%; margin-top:16px;}
  .btn-google{background:#fff; color:#3c4043; border:1px solid #dadce0;}
  .btn-google:hover{background:#f8f8f8;}
  .btn-ghost{background:none; color:var(--ink-soft); text-decoration:underline;}
  .field{margin-bottom:12px; text-align:left;}
  .field label{display:block; font-size:12px; font-weight:700; margin-bottom:4px; color:var(--ink-soft);}
  .field input, .field select{width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:7px; font-size:13.5px; font-family:var(--sans);}
  .error-box{display:none; color:var(--danger); font-size:12.5px; margin-top:10px; text-align:center;}
  code{background:var(--bg); padding:1px 5px; border-radius:4px; font-size:12px;}

  /* ---- 앱 화면 (로그인 이후) ---- */
  .topbar{position:sticky; top:0; z-index:20; background:var(--surface); border-bottom:1px solid var(--line); padding:14px 24px; display:flex; align-items:center; gap:14px;}
  .topbar .btn{width:auto; margin:0; padding:8px 14px;}
  .topbar .btn-ghost2{background:none; border:1px solid var(--line); color:var(--ink);}
  .topbar .btn-primary2{background:var(--accent); color:#fff; border:none;}
  .app{max-width:960px; margin:0 auto; padding:24px;}
  .game-list{display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:12px;}
  .game-card{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:16px; cursor:pointer;}
  .game-card:hover{border-color:var(--accent);}
  .game-card .name{font-weight:700; font-size:14.5px;}
  .game-card .meta{font-size:11.5px; color:var(--ink-soft); margin-top:4px;}
  .back{background:none; border:none; color:var(--ink-soft); font-size:12.5px; cursor:pointer; padding:0; margin-bottom:14px;}
  .case-table{width:100%; border-collapse:collapse; font-size:13px;}
  .case-table th{text-align:left; font-size:11px; color:var(--ink-soft); padding:0 8px 8px; border-bottom:1px solid var(--line);}
  .case-table td{padding:8px; border-bottom:1px solid var(--line); vertical-align:middle;}
  .case-table input, .case-table select{width:100%; padding:6px 8px; border:1px solid var(--line); border-radius:6px; font-size:13px; font-family:var(--sans);}
  .case-A{--c:#C1440E;} .case-B{--c:#B08900;} .case-C{--c:#4C7A1F;} .case-D{--c:#1F7A5C;}
  .case-E{--c:#1F7A8C;} .case-F{--c:#2A5CA6;} .case-G{--c:#5B3FA6;} .case-H{--c:#9C2E8C;}
  .case-I{--c:#B32E5C;} .case-J{--c:#8C3A2E;} .case-K{--c:#5C5C1F;} .case-L{--c:#3A5C3A;}
  .case-badge{display:inline-flex; align-items:center; font-family:var(--mono); font-weight:800; font-size:14px; padding:4px 9px; border-radius:6px; border:2px solid var(--c); color:var(--c);}

  .tabs{display:flex; gap:6px; margin-bottom:14px;}
  .tabs button{background:none; border:1px solid var(--line); border-radius:7px; padding:7px 14px; font-size:12.5px; font-weight:700; color:var(--ink-soft); cursor:pointer;}
  .tabs button.active{background:var(--ink); color:#fff; border-color:var(--ink);}
  .photo-stage{position:relative; width:100%; aspect-ratio:4/3; background:#111 center/contain no-repeat; border-radius:10px; overflow:hidden;}
  .photo-nav{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .marker{position:absolute; width:24px; height:24px; border-radius:50%; background:var(--c,var(--accent)); border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.5); transform:translate(-50%,-50%); cursor:grab; display:flex; align-items:center; justify-content:center; color:#fff; font-family:var(--mono); font-weight:800; font-size:12px; z-index:5;}
  .line-layer{position:absolute; inset:0; pointer-events:none; z-index:1; overflow:visible;}
  .conn-line{position:absolute; height:0; border-top:1.5px dashed rgba(255,255,255,.9); transform-origin:0 0; pointer-events:none;}
  .marker:active{cursor:grabbing;}
  .anno-box{position:absolute; background:rgba(255,255,255,.97); border:1px solid var(--line); border-radius:8px; padding:8px; min-width:150px; max-width:220px; box-shadow:0 3px 12px rgba(0,0,0,.25); font-size:11.5px; cursor:grab;}
  .anno-box:active{cursor:grabbing;}
  .anno-head{display:flex; align-items:center; gap:6px; margin-bottom:6px;}
  .anno-head select{font-family:var(--mono); font-weight:800; font-size:12px; padding:2px 4px; border:1px solid var(--line); border-radius:5px;}
  .anno-del{margin-left:auto; background:none; border:none; color:var(--ink-soft); cursor:pointer; font-size:13px; padding:0 2px;}
  .anno-item{display:flex; gap:4px; margin-bottom:3px;}
  .anno-item input[type=text]{flex:1; min-width:0; padding:3px 5px; font-size:11px; border:1px solid var(--line); border-radius:4px;}
  .anno-item input[type=number]{width:42px; padding:3px 4px; font-size:11px; border:1px solid var(--line); border-radius:4px;}
  .anno-item button{background:none; border:none; color:var(--ink-soft); cursor:pointer; font-size:11px; padding:0 2px;}
  .anno-additem{font-size:10.5px; color:var(--accent); background:none; border:none; cursor:pointer; padding:2px 0; font-weight:700;}
  .anno-label-btn{background:#000; color:#fff; border:none; border-radius:4px; font-size:10px; padding:3px 8px; cursor:pointer; font-weight:700; margin-top:4px;}

  /* ---- 사진 자르기/회전 모달 ---- */
  .modal-backdrop{position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:300; display:flex; align-items:center; justify-content:center; padding:20px;}
  .modal{background:var(--surface); border-radius:14px; padding:20px; max-width:520px; width:100%; max-height:90vh; overflow-y:auto;}
  .modal h3{margin:0 0 12px; font-size:15px;}
  .crop-toolbar{display:flex; gap:8px; margin-bottom:10px;}
  .crop-toolbar button{border:1px solid var(--line); background:var(--surface); border-radius:7px; padding:6px 12px; font-size:12.5px; cursor:pointer;}
  .crop-canvas-wrap{position:relative; width:100%; background:#111; border-radius:8px; overflow:hidden;}
  .crop-canvas-wrap canvas{position:absolute; inset:0; width:100%; height:100%;}
  .crop-box{position:absolute; border:1.5px dashed #fff; box-shadow:0 0 0 2000px rgba(0,0,0,.45);}
  .crop-handle{position:absolute; right:-6px; bottom:-6px; width:14px; height:14px; background:#fff; border:2px solid var(--accent); border-radius:3px; cursor:nwse-resize;}
  .modal-actions{display:flex; justify-content:flex-end; gap:8px; margin-top:16px;}
  .modal-actions button{border:none; border-radius:7px; padding:9px 16px; font-size:13px; font-weight:700; cursor:pointer;}
  .modal-actions .btn-cancel{background:none; color:var(--ink-soft); border:1px solid var(--line);}
  .modal-actions .btn-apply{background:var(--accent); color:#fff;}
  .label-wrap{position:absolute;}
  .label-rotate-group{position:relative; display:inline-block; transform-origin:center center;}
  .photo-label{background:#000; color:#fff; font-weight:700; padding:6px 10px; border-radius:3px; text-align:center; white-space:pre-wrap; outline:none; min-width:1.5em; cursor:text; box-sizing:border-box; display:flex; align-items:center; justify-content:center;}
  .label-resize{position:absolute; width:12px; height:12px; background:#fff; border:2px solid var(--accent); border-radius:2px; cursor:nwse-resize;}
  .label-toolbar{position:absolute; display:flex; gap:2px; background:var(--surface); border:1px solid var(--line); border-radius:6px; padding:2px; box-shadow:0 2px 6px rgba(0,0,0,.15); white-space:nowrap;}
  .label-toolbar button{border:none; background:none; font-size:11px; padding:3px 6px; cursor:pointer; border-radius:4px;}
  .label-toolbar button:hover{background:var(--bg);}
  .label-drag{cursor:grab; padding:3px 5px; font-size:11px; color:var(--ink-soft);}
  .align-guide{position:absolute; background:#ff4444; pointer-events:none; z-index:9;}
  .upload-row{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
</style>
</head>
<body>

<div class="login-gate" id="loginGate">
  <div class="login-gate-box" id="gateContent">
    <div class="brand">RED BUTTON<span class="r-mark">®</span></div>
    <p>불러오는 중...</p>
  </div>
</div>

<div id="appRoot" style="display:none;">
  <div class="topbar">
    <div class="brand" style="margin:0;">RED BUTTON<span class="r-mark">®</span></div>
    <div style="flex:1;"></div>
    <span id="roleLabel" style="font-size:12px; color:var(--ink-soft);"></span>
    <button class="btn btn-ghost2" onclick="renderList()">← 목록</button>
    <button class="btn btn-primary2" id="newGameBtn" style="display:none;" onclick="createNewGame()">+ 새 게임</button>
    <button class="btn btn-ghost2" onclick="doLogout()">로그아웃</button>
  </div>
  <div class="app" id="app"></div>
</div>

<!-- Firebase SDK (CDN, 모듈 방식) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, collection, getDocs, addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

// ============================================================
// Firebase 설정 (프로젝트 설정 > 내 앱 에서 복사한 값)
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyAQmukoq1izvjFjxK-TVWG-1GMCPrvjLdk",
  authDomain: "redbutton-organizing-guide.firebaseapp.com",
  projectId: "redbutton-organizing-guide",
  storageBucket: "redbutton-organizing-guide.firebasestorage.app",
  messagingSenderId: "503497098724",
  appId: "1:503497098724:web:e97a10fdd5d2941797b3f1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);
const provider = new GoogleAuthProvider();

const POSITIONS = ['점주','점장','매니저','트레이너','버트너','본사'];
const CASE_TYPES = ['A','B','C','D','E','F','G','H','I','J','K','L'];
const gateContent = document.getElementById('gateContent');
const appEl = document.getElementById('app');

let currentRole = 'viewer';
let games = [];
let currentGameId = null;
let currentMode = 'photo'; // 'photo' | 'table'
let currentPhotoIdx = 0;
let photoUrlCache = {}; // storagePath -> 다운로드 URL (매번 다시 안 구해오게)
let labelRectsCache_ = []; // 정렬 가이드용: 각 라벨의 실제 화면 위치

// ============================================================
// 로그인 화면 렌더링
// ============================================================
function renderLoginButton(){
  gateContent.innerHTML = `
    <div class="brand">RED BUTTON<span class="r-mark">®</span></div>
    <p>레드버튼 오거나이징 가이드는 사내 전용 자료입니다.<br>구글 계정으로 로그인해주세요.</p>
    <button class="btn btn-google" id="googleLoginBtn">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.85 2.09-1.81 2.73v2.27h2.93c1.71-1.58 2.69-3.9 2.69-6.64z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.93-2.27c-.81.54-1.85.86-3.03.86-2.33 0-4.3-1.57-5-3.68H1.02v2.34C2.5 15.98 5.52 18 9 18z"/><path fill="#FBBC05" d="M4 10.72c-.18-.54-.28-1.12-.28-1.72s.1-1.18.28-1.72V4.94H1.02C.37 6.22 0 7.57 0 9s.37 2.78 1.02 4.06L4 10.72z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.59-2.59C13.46.89 11.43 0 9 0 5.52 0 2.5 2.02 1.02 4.94L4 7.28C4.7 5.17 6.67 3.58 9 3.58z"/></svg>
      Google로 로그인
    </button>
    <div class="error-box" id="errorBox"></div>
  `;
  document.getElementById('googleLoginBtn').addEventListener('click', handleGoogleLogin);
}

function renderChecking(){
  gateContent.innerHTML = `
    <div class="brand">RED BUTTON<span class="r-mark">®</span></div>
    <p>로그인 확인 중...</p>
  `;
}

function renderPending(email, isNew){
  gateContent.innerHTML = `
    <div class="brand">RED BUTTON<span class="r-mark">®</span></div>
    <p style="margin-top:10px;">${isNew ? '접근 권한 요청이 접수되었습니다.' : '아직 승인 대기 중입니다.'}<br>담당자의 승인 후 이용하실 수 있습니다.</p>
    <p style="margin-top:14px; font-size:12px;">로그인 계정: ${email}</p>
    <button class="btn btn-ghost" id="logoutBtn2">다른 계정으로 로그인</button>
  `;
  document.getElementById('logoutBtn2').addEventListener('click', ()=>signOut(auth));
}

async function renderProfileForm(email){
  gateContent.innerHTML = `
    <div class="brand">RED BUTTON<span class="r-mark">®</span></div>
    <p style="margin-bottom:14px;">처음 로그인하셨네요. 접근 요청을 위해<br>아래 정보를 입력해주세요.</p>
    <div id="profileFormBody"><p>불러오는 중...</p></div>
  `;
  let stores = [];
  try{
    const snap = await getDocs(collection(db, 'stores'));
    snap.forEach(d => stores.push({ code: d.id, name: d.data().name }));
  }catch(e){ console.error(e); }
  stores.sort((a,b)=> String(a.name).localeCompare(String(b.name), 'ko'));

  document.getElementById('profileFormBody').innerHTML = `
    <div class="field">
      <label>매장</label>
      <select id="storeSelect">
        <option value="">매장을 선택하세요</option>
        ${stores.map(s=>`<option value="${s.code}">${s.name}</option>`).join('')}
      </select>
    </div>
    <div class="field">
      <label>이름</label>
      <input type="text" id="nameInput" placeholder="홍길동">
    </div>
    <div class="field">
      <label>직급</label>
      <select id="positionSelect">
        <option value="">직급을 선택하세요</option>
        ${POSITIONS.map(p=>`<option value="${p}">${p}</option>`).join('')}
      </select>
    </div>
    <div class="error-box" id="profileErrorBox"></div>
    <button class="btn btn-google" id="submitProfileBtn" style="background:var(--accent); color:#fff; border:none;">제출</button>
  `;
  document.getElementById('submitProfileBtn').addEventListener('click', ()=>submitProfile(email));
}

async function enterApp(email, role){
  currentRole = role;
  document.getElementById('loginGate').style.display = 'none';
  document.getElementById('appRoot').style.display = 'block';
  document.getElementById('roleLabel').textContent = `${email} · ${role === 'editor' ? '편집자' : '뷰어'}`;
  document.getElementById('newGameBtn').style.display = role === 'editor' ? 'inline-flex' : 'none';
  await loadGames();
  renderList();
}

// ============================================================
// 로그인 처리
// ============================================================
async function handleGoogleLogin(){
  try{
    await signInWithPopup(auth, provider);
  }catch(e){
    console.error(e);
    const box = document.getElementById('errorBox');
    if (box){ box.style.display='block'; box.textContent = '로그인에 실패했습니다. 다시 시도해주세요.'; }
  }
}

function doLogout(){ signOut(auth); }

async function checkAccessAndRender(user){
  const email = user.email.toLowerCase().trim();
  renderChecking();

  try{
    const [editorSnap, viewerSnap, pendingSnap] = await Promise.all([
      getDoc(doc(db, 'editors', email)),
      getDoc(doc(db, 'viewers', email)),
      getDoc(doc(db, 'pending', email)),
    ]);

    if (editorSnap.exists()) return enterApp(email, 'editor');
    if (viewerSnap.exists()) return enterApp(email, 'viewer');
    if (pendingSnap.exists()) return renderPending(email, false);
    return renderProfileForm(email);
  }catch(e){
    console.error('로그인 확인 실패:', e);
    gateContent.innerHTML = `
      <div class="brand">RED BUTTON<span class="r-mark">®</span></div>
      <p style="color:var(--danger);">로그인 확인 중 오류가 발생했습니다.<br>(개발자 도구 콘솔에 자세한 내용이 남습니다)</p>
      <p style="margin-top:8px; font-size:11px; word-break:break-all;">${e.code || e.message || e}</p>
      <button class="btn btn-ghost" id="logoutBtnErr">다시 로그인</button>
    `;
    document.getElementById('logoutBtnErr').addEventListener('click', ()=>signOut(auth));
  }
}

async function submitProfile(email){
  const storeCode = document.getElementById('storeSelect').value;
  const name = document.getElementById('nameInput').value.trim();
  const position = document.getElementById('positionSelect').value;
  const errorBox = document.getElementById('profileErrorBox');
  if (!storeCode || !name || !position){
    errorBox.style.display = 'block';
    errorBox.textContent = '매장, 이름, 직급을 모두 입력해주세요.';
    return;
  }
  await setDoc(doc(db, 'pending', email), { name, position, storeCode, requestedAt: Date.now() });
  renderPending(email, true);
}

// ============================================================
// 게임 목록 / 상세 (핵심 CRUD) - 이번 단계에서는 사진 없이 케이스만
// ============================================================
async function loadGames(){
  const snap = await getDocs(collection(db, 'games'));
  games = [];
  snap.forEach(d => games.push({ id: d.id, ...d.data() }));
  games.sort((a,b)=> String(a.name||'').localeCompare(String(b.name||''), 'ko'));
}

function renderList(){
  currentGameId = null;
  appEl.innerHTML = `
    <div class="game-list">
      ${games.length ? games.map(g=>`
        <div class="game-card" onclick="openGame('${g.id}')">
          <div class="name">${g.name || '(이름 없음)'}</div>
          <div class="meta">케이스 ${(g.cases||[]).length}개</div>
        </div>
      `).join('') : '<p>등록된 게임이 없습니다. "+ 새 게임"으로 추가해보세요.</p>'}
    </div>
  `;
}

async function createNewGame(){
  const name = prompt('새 게임 이름을 입력하세요:');
  if (!name || !name.trim()) return;
  const ref = await addDoc(collection(db, 'games'), {
    name: name.trim(),
    cases: [],
    guideDone: false,
    completedBy: [],
    note: '',
    updatedAt: Date.now()
  });
  await loadGames();
  openGame(ref.id);
}

function openGame(id){
  currentGameId = id;
  currentMode = 'photo';
  currentPhotoIdx = 0;
  renderDetail();
}

function renderDetail(){
  const g = games.find(x=>x.id===currentGameId);
  if (!g){ renderList(); return; }
  const editable = currentRole === 'editor';

  appEl.innerHTML = `
    <button class="back" onclick="renderList()">← 목록으로</button>
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:16px;">
      <h2 style="margin:0;">${g.name}</h2>
      ${editable ? `<button class="btn btn-primary2" style="width:auto; padding:6px 14px; font-size:12.5px;" onclick="saveGame()">💾 저장</button>` : ''}
    </div>
    <div class="tabs">
      <button class="${currentMode==='photo'?'active':''}" onclick="switchMode('photo')">사진</button>
      <button class="${currentMode==='table'?'active':''}" onclick="switchMode('table')">표</button>
    </div>
    <div id="tabBody"></div>
  `;
  if (currentMode === 'photo') renderPhotoTab(); else renderTableTab();
}

function switchMode(m){
  currentMode = m;
  currentPhotoIdx = 0;
  renderDetail();
}

// ---- 사진 탭 ----
async function renderPhotoTab(){
  const g = games.find(x=>x.id===currentGameId);
  const editable = currentRole === 'editor';
  const photos = g.photos || [];
  const body = document.getElementById('tabBody');

  const uploadRowHtml = editable ? `
    <div class="upload-row">
      <input type="file" id="photoFileInput" accept="image/*">
      <button class="btn btn-primary2" style="width:auto;" onclick="uploadPhoto()">업로드</button>
      <span id="uploadStatus" style="font-size:12px; color:var(--ink-soft);"></span>
    </div>
  ` : '';

  if (!photos.length){
    body.innerHTML = `${uploadRowHtml}<p>등록된 사진이 없습니다.${editable ? ' 위에서 업로드해주세요.' : ''}</p>`;
    return;
  }

  if (currentPhotoIdx >= photos.length) currentPhotoIdx = 0;
  const photo = photos[currentPhotoIdx];

  body.innerHTML = `
    ${uploadRowHtml}
    <div class="photo-nav">
      <button class="btn btn-ghost2" style="width:auto;" onclick="prevPhoto()" ${photos.length<2?'disabled':''}>◀</button>
      <span style="font-size:12.5px; color:var(--ink-soft);">${currentPhotoIdx+1} / ${photos.length}</span>
      <button class="btn btn-ghost2" style="width:auto;" onclick="nextPhoto()" ${photos.length<2?'disabled':''}>▶</button>
      ${editable ? `<button class="btn btn-ghost2" style="width:auto; margin-left:auto;" onclick="deletePhoto()">사진 삭제</button>` : ''}
    </div>
    <div class="photo-stage" id="photoStage">
      <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#999; font-size:12px;">불러오는 중...</div>
    </div>
    ${editable ? `<p style="margin-top:8px; font-size:11.5px;">사진의 빈 곳을 더블클릭하면 새 마커와 텍스트박스가 추가됩니다. 마커와 텍스트박스는 각각 드래그로 옮길 수 있고, 텍스트박스 안에서 케이스종류·구성품·수량을 바로 수정할 수 있습니다.</p>` : ''}
  `;

  const url = await resolvePhotoUrl_(photo.storagePath);
  const stage = document.getElementById('photoStage');
  if (!stage) return; // 그 사이 다른 사진으로 넘어갔으면 중단
  stage.style.backgroundImage = `url('${url}')`;
  stage.innerHTML = '<div class="line-layer" id="lineLayer"></div>';
  drawMarkers(stage, photo, editable);
  drawLabels(stage, photo, editable);

  if (editable){
    stage.ondblclick = (e)=>{
      if (e.target !== stage) return;
      const rect = stage.getBoundingClientRect();
      const x = (e.clientX-rect.left)/rect.width*100;
      const y = (e.clientY-rect.top)/rect.height*100;
      const boxX = x < 60 ? Math.min(97, x+8) : Math.max(3, x-8);
      const boxY = Math.max(5, Math.min(90, y-4));
      g.cases = g.cases || [];
      g.cases.push({ caseType:'A', items:[{name:'새 구성품', qty:1}] });
      photo.markers = photo.markers || [];
      photo.markers.push({ x, y, caseIdx: g.cases.length-1, box:{x:boxX, y:boxY} });
      drawMarkers(stage, photo, editable);
      drawLabels(stage, photo, editable);
    };
  }
}

function drawMarkers(stage, photo, editable){
  const g = games.find(x=>x.id===currentGameId);
  stage.querySelectorAll('.marker, .anno-box').forEach(el=>el.remove());
  const lineLayer = stage.querySelector('#lineLayer');
  if (lineLayer) lineLayer.innerHTML = '';

  (photo.markers||[]).forEach((m, mi)=>{
    const c = g.cases[m.caseIdx];

    // ---- 마커(케이스 알파벳이 표시된 원) ----
    const dot = document.createElement('div');
    dot.className = 'marker' + (c ? ` case-${c.caseType}` : '');
    dot.style.left = m.x+'%';
    dot.style.top = m.y+'%';
    dot.textContent = c ? c.caseType : '';
    dot.title = `케이스 ${mi+1}`;
    if (editable){
      dot.addEventListener('pointerdown', (e)=>{
        e.stopPropagation();
        const move = (ev)=>{
          const rect = stage.getBoundingClientRect();
          m.x = Math.max(0, Math.min(100, (ev.clientX-rect.left)/rect.width*100));
          m.y = Math.max(0, Math.min(100, (ev.clientY-rect.top)/rect.height*100));
          dot.style.left = m.x+'%';
          dot.style.top = m.y+'%';
          drawConnLine_(stage, lineLayer, mi, dot, box);
        };
        const up = ()=>{ window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
        window.addEventListener('pointermove', move);
        window.addEventListener('pointerup', up);
      });
    }
    stage.appendChild(dot);

    // ---- 텍스트박스(케이스 정보 패널) ----
    let box = null;
    if (!m.box || !c){ return; } // 구버전 마커(박스 없이 만들어진 것)는 패널 없이 점만 표시

    box = document.createElement('div');
    box.className = 'anno-box';
    box.style.left = m.box.x+'%';
    box.style.top = m.box.y+'%';

    if (editable){
      box.innerHTML = `
        <div class="anno-head">
          <select onchange="updateMarkerCaseType(${mi}, this.value)">${CASE_TYPES.map(t=>`<option value="${t}" ${t===c.caseType?'selected':''}>${t}</option>`).join('')}</select>
          <button class="anno-del" title="이 마커/케이스 삭제" onclick="removeMarkerCase(${mi})">✕</button>
        </div>
        <div id="annoItems${mi}">
          ${(c.items||[]).map((it, ii)=>`
            <div class="anno-item">
              <input type="text" value="${it.name||''}" placeholder="구성품명" onchange="updateMarkerItem(${mi},${ii},'name',this.value)">
              <input type="number" value="${it.qty||0}" onchange="updateMarkerItem(${mi},${ii},'qty',this.value)">
              <button onclick="deleteMarkerItem(${mi},${ii})">✕</button>
            </div>
          `).join('')}
        </div>
        <button class="anno-additem" onclick="addMarkerItem(${mi})">+ 항목 추가</button>
        <button class="anno-label-btn" onclick="createLabelFromMarker(${mi})">라벨 만들기</button>
      `;
      // 박스 자체를 드래그로 옮기기 (입력창/버튼 클릭은 제외)
      box.addEventListener('pointerdown', (e)=>{
        if (['INPUT','BUTTON','SELECT','OPTION'].includes(e.target.tagName)) return;
        e.stopPropagation();
        const move = (ev)=>{
          const rect = stage.getBoundingClientRect();
          m.box.x = Math.max(0, Math.min(100, (ev.clientX-rect.left)/rect.width*100));
          m.box.y = Math.max(0, Math.min(100, (ev.clientY-rect.top)/rect.height*100));
          box.style.left = m.box.x+'%';
          box.style.top = m.box.y+'%';
          drawConnLine_(stage, lineLayer, mi, dot, box);
        };
        const up = ()=>{ window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
        window.addEventListener('pointermove', move);
        window.addEventListener('pointerup', up);
      });
    } else {
      box.innerHTML = `
        <div class="anno-head"><span class="case-badge case-${c.caseType}" style="font-size:11px; padding:2px 6px;">${c.caseType}</span></div>
        ${(c.items||[]).map(it=>`<div style="margin-bottom:2px;">${it.name||''}${it.qty?` <span style="color:var(--ink-soft);">${it.qty}개</span>`:''}</div>`).join('')}
      `;
    }
    stage.appendChild(box);

    // ---- 마커 ↔ 텍스트박스 연결선 ----
    // 둘 다 화면에 실제로 그려진 뒤, 두 요소를 똑같은 방식(getBoundingClientRect)으로
    // 측정해서 선을 긋습니다. (한쪽은 저장된 값, 한쪽은 측정값을 섞어 쓰면 어긋날 수 있어서
    // 반드시 같은 방식으로 통일합니다)
    if (lineLayer) drawConnLine_(stage, lineLayer, mi, dot, box);
  });
}

/**
 * 마커(dot)와 텍스트박스(box) 두 DOM 요소의 실제 화면 위치를 측정해서, 그 사이를
 * 잇는 점선을 순수 CSS(회전된 div)로 그립니다. (SVG 좌표계 관련 문제를 피하기 위해
 * 일부러 SVG를 쓰지 않습니다)
 */
function drawConnLine_(stage, lineLayer, mi, dot, box){
  if (!lineLayer || !dot || !box) return;
  const stageRect = stage.getBoundingClientRect();
  const dotRect = dot.getBoundingClientRect();
  const boxRect = box.getBoundingClientRect();

  const x1 = (dotRect.left + dotRect.width/2) - stageRect.left;
  const y1 = (dotRect.top + dotRect.height/2) - stageRect.top;
  const x2 = boxRect.left - stageRect.left; // 박스의 왼쪽 가장자리 중앙 (마커가 대체로 왼쪽에 있음)
  const y2 = (boxRect.top + boxRect.height/2) - stageRect.top;

  const dx = x2 - x1, dy = y2 - y1;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const angle = Math.atan2(dy, dx) * 180 / Math.PI;

  let line = lineLayer.querySelector(`#connLine${mi}`);
  if (!line){
    line = document.createElement('div');
    line.className = 'conn-line';
    line.id = `connLine${mi}`;
    lineLayer.appendChild(line);
  }
  line.style.left = x1+'px';
  line.style.top = y1+'px';
  line.style.width = dist+'px';
  line.style.transform = `rotate(${angle}deg)`;
}

/**
 * 라벨을 드래그할 때 다른 라벨과 가장자리/중앙이 맞으면 빨간 점선으로 표시합니다.
 * xPos/yPos가 null이면 해당 방향 가이드를 지웁니다.
 */
function renderAlignGuides_(stage, xPos, yPos){
  let layer = stage.querySelector('#alignGuideLayer');
  if (!layer){
    layer = document.createElement('div');
    layer.id = 'alignGuideLayer';
    layer.style.cssText = 'position:absolute; inset:0; pointer-events:none; z-index:9;';
    stage.appendChild(layer);
  }
  layer.innerHTML = '';
  if (xPos != null){
    const el = document.createElement('div');
    el.className = 'align-guide';
    el.style.cssText = `left:${xPos}px; top:0; bottom:0; width:1.5px;`;
    layer.appendChild(el);
  }
  if (yPos != null){
    const el = document.createElement('div');
    el.className = 'align-guide';
    el.style.cssText = `top:${yPos}px; left:0; right:0; height:1.5px;`;
    layer.appendChild(el);
  }
}

// ---- 텍스트박스 안 편집 동작들 ----
function updateMarkerCaseType(mi, val){
  const g = games.find(x=>x.id===currentGameId);
  const photo = g.photos[currentPhotoIdx];
  g.cases[photo.markers[mi].caseIdx].caseType = val;
  redrawCurrentPhoto_();
}
function updateMarkerItem(mi, ii, field, val){
  const g = games.find(x=>x.id===currentGameId);
  const photo = g.photos[currentPhotoIdx];
  g.cases[photo.markers[mi].caseIdx].items[ii][field] = field==='qty' ? Number(val) : val;
}
function addMarkerItem(mi){
  const g = games.find(x=>x.id===currentGameId);
  const photo = g.photos[currentPhotoIdx];
  g.cases[photo.markers[mi].caseIdx].items.push({name:'', qty:1});
  redrawCurrentPhoto_();
}
function deleteMarkerItem(mi, ii){
  const g = games.find(x=>x.id===currentGameId);
  const photo = g.photos[currentPhotoIdx];
  const items = g.cases[photo.markers[mi].caseIdx].items;
  items.splice(ii, 1);
  if (items.length === 0) items.push({name:'', qty:1}); // 최소 한 줄은 유지 (완전히 비면 편집이 어려움)
  redrawCurrentPhoto_();
}
function removeMarkerCase(mi){
  if (!confirm('이 마커와 케이스를 삭제할까요?')) return;
  const g = games.find(x=>x.id===currentGameId);
  const photo = g.photos[currentPhotoIdx];
  const caseIdx = photo.markers[mi].caseIdx;
  photo.markers.splice(mi, 1);
  g.cases.splice(caseIdx, 1);
  // 뒤에 있던 케이스들의 인덱스가 하나씩 당겨지므로, 모든 사진의 마커 참조를 보정합니다.
  g.photos.forEach(p=>{
    (p.markers||[]).forEach(m=>{ if (m.caseIdx > caseIdx) m.caseIdx--; });
  });
  redrawCurrentPhoto_();
}
function redrawCurrentPhoto_(){
  const g = games.find(x=>x.id===currentGameId);
  const photo = g.photos[currentPhotoIdx];
  const stage = document.getElementById('photoStage');
  if (!stage) return;
  const editable = currentRole==='editor';
  drawMarkers(stage, photo, editable);
  drawLabels(stage, photo, editable);
}

// ---- 라벨 (실제 라벨기 인쇄 미리보기: 검정 바탕 흰 글씨) ----
function createLabelFromMarker(mi){
  const g = games.find(x=>x.id===currentGameId);
  const photo = g.photos[currentPhotoIdx];
  const m = photo.markers[mi];
  const c = g.cases[m.caseIdx];
  const text = (c.items||[]).map(it => it.qty ? `${it.name} ${it.qty}개` : it.name).join('\n');
  photo.labels = photo.labels || [];
  const baseX = m.box ? m.box.x : m.x;
  const baseY = m.box ? m.box.y : m.y;
  photo.labels.push({ x: Math.min(94, baseX+6), y: Math.min(90, baseY+10), text, fontSize:14 });
  redrawCurrentPhoto_();
}

function drawLabels(stage, photo, editable){
  stage.querySelectorAll('.label-wrap').forEach(el=>el.remove());
  labelRectsCache_ = [];
  (photo.labels||[]).forEach((lbl, li)=>{
    const rotation = lbl.rotation || 0;
    const wrap = document.createElement('div');
    wrap.className = 'label-wrap';
    wrap.style.left = lbl.x+'%';
    wrap.style.top = lbl.y+'%';

    const rotateGroup = document.createElement('div');
    rotateGroup.className = 'label-rotate-group';
    rotateGroup.style.transform = `rotate(${rotation}deg)`;

    const labelEl = document.createElement('div');
    labelEl.className = 'photo-label';
    labelEl.style.fontSize = (lbl.fontSize||14)+'px';
    if (lbl.widthPct != null && lbl.heightPct != null){
      const stageRect = stage.getBoundingClientRect();
      labelEl.style.width = (stageRect.width * lbl.widthPct/100)+'px';
      labelEl.style.height = (stageRect.height * lbl.heightPct/100)+'px';
      labelEl.style.overflow = 'hidden';
    }
    labelEl.textContent = lbl.text;

    rotateGroup.appendChild(labelEl);
    wrap.appendChild(rotateGroup);
    stage.appendChild(wrap); // 실제 위치/크기를 측정하려면 먼저 화면(DOM)에 붙어있어야 함

    // 정렬 가이드용: 이 라벨의 실제 화면 위치를 저장해둡니다.
    {
      const stageRectNow = stage.getBoundingClientRect();
      const groupRectNow = rotateGroup.getBoundingClientRect();
      labelRectsCache_[li] = {
        left: groupRectNow.left - stageRectNow.left,
        top: groupRectNow.top - stageRectNow.top,
        right: groupRectNow.right - stageRectNow.left,
        bottom: groupRectNow.bottom - stageRectNow.top,
        centerX: (groupRectNow.left + groupRectNow.right)/2 - stageRectNow.left,
        centerY: (groupRectNow.top + groupRectNow.bottom)/2 - stageRectNow.top
      };
    }

    if (editable){
      labelEl.contentEditable = 'true';
      labelEl.addEventListener('blur', ()=>{ lbl.text = labelEl.innerText; });

      // 회전 후 실제 화면에 보이는 라벨의 테두리를 측정해서, 툴바는 왼쪽 위
      // 모서리 바로 위, 손잡이는 오른쪽 아래 모서리에 맞춰 배치합니다.
      const wrapRect = wrap.getBoundingClientRect();
      const groupRect = rotateGroup.getBoundingClientRect();
      const relLeft = groupRect.left - wrapRect.left;
      const relTop = groupRect.top - wrapRect.top;
      const relRight = groupRect.right - wrapRect.left;
      const relBottom = groupRect.bottom - wrapRect.top;

      const toolbar = document.createElement('div');
      toolbar.className = 'label-toolbar';
      toolbar.style.left = relLeft+'px';
      toolbar.style.top = (relTop-28)+'px';
      toolbar.innerHTML = `
        <span class="label-drag">⠿</span>
        <button onclick="changeLabelFontSize(${li},-1)">A-</button>
        <button onclick="changeLabelFontSize(${li},1)">A+</button>
        <button onclick="rotateLabel(${li})">⟳</button>
        <button onclick="deleteLabel(${li})">✕</button>
      `;
      toolbar.querySelector('.label-drag').addEventListener('pointerdown', (e)=>{
        e.stopPropagation();
        // labelEl.offsetWidth/Height는 회전 영향을 안 받는 "원래(로컬)" 크기이고,
        // getBoundingClientRect는 회전이 반영된 "화면에 보이는" 크기입니다.
        // 90/270도 회전이면 이 둘이 서로 다르므로, 그 차이를 보정값으로 미리 구해둡니다.
        const localW = labelEl.offsetWidth, localH = labelEl.offsetHeight;
        const swapped = (rotation === 90 || rotation === 270);
        const visualW = swapped ? localH : localW;
        const visualH = swapped ? localW : localH;
        const offsetXPx = (localW - visualW) / 2; // wrap 기준 위치 → 실제 화면 왼쪽위로 변환하는 보정값
        const offsetYPx = (localH - visualH) / 2;

        const move = (ev)=>{
          const rect = stage.getBoundingClientRect();
          let x = (ev.clientX-rect.left)/rect.width*100;
          let y = (ev.clientY-rect.top)/rect.height*100;
          x = Math.max(0, Math.min(100, x));
          y = Math.max(0, Math.min(100, y));

          // ---- 정렬 가이드: 다른 라벨과 가장자리/중앙이 가까우면 딱 맞춰서(스냅) 표시 ----
          const SNAP_PX = 6;
          const flowLeftPx = x/100*rect.width, flowTopPx = y/100*rect.height;
          const curLeft = flowLeftPx + offsetXPx, curTop = flowTopPx + offsetYPx; // 실제 화면상 위치로 보정
          const curRight = curLeft + visualW, curBottom = curTop + visualH;
          const curCenterX = curLeft + visualW/2, curCenterY = curTop + visualH/2;

          let bestX = null, bestY = null;
          labelRectsCache_.forEach((r, idx)=>{
            if (!r || idx === li) return;
            [[curLeft, r.left, 0], [curRight, r.right, -visualW], [curCenterX, r.centerX, -visualW/2]].forEach(([cur, target, adj])=>{
              const diff = Math.abs(cur - target);
              if (diff < SNAP_PX && (!bestX || diff < bestX.diff)) bestX = { diff, snap: target+adj, guidePos: target };
            });
            [[curTop, r.top, 0], [curBottom, r.bottom, -visualH], [curCenterY, r.centerY, -visualH/2]].forEach(([cur, target, adj])=>{
              const diff = Math.abs(cur - target);
              if (diff < SNAP_PX && (!bestY || diff < bestY.diff)) bestY = { diff, snap: target+adj, guidePos: target };
            });
          });
          // 스냅된 "화면상 위치"를 다시 wrap의 flow 위치(%)로 역산해서 반영합니다.
          if (bestX) x = ((bestX.snap - offsetXPx) / rect.width) * 100;
          if (bestY) y = ((bestY.snap - offsetYPx) / rect.height) * 100;

          lbl.x = x; lbl.y = y;
          wrap.style.left = x+'%';
          wrap.style.top = y+'%';
          renderAlignGuides_(stage, bestX ? bestX.guidePos : null, bestY ? bestY.guidePos : null);
        };
        const up = ()=>{
          window.removeEventListener('pointermove', move);
          window.removeEventListener('pointerup', up);
          renderAlignGuides_(stage, null, null);
        };
        window.addEventListener('pointermove', move);
        window.addEventListener('pointerup', up);
      });
      wrap.appendChild(toolbar);

      // 크기 조절 손잡이 - 회전과 무관하게 항상 화면상 오른쪽 아래 모서리에 고정합니다.
      const resizeHandle = document.createElement('div');
      resizeHandle.className = 'label-resize';
      resizeHandle.style.left = (relRight-6)+'px';
      resizeHandle.style.top = (relBottom-6)+'px';
      resizeHandle.addEventListener('pointerdown', (e)=>{
        e.stopPropagation();
        const stageRect = stage.getBoundingClientRect();
        const startW = labelEl.getBoundingClientRect().width;
        const startH = labelEl.getBoundingClientRect().height;
        const startX = e.clientX, startY = e.clientY;
        const swapped = (rotation === 90 || rotation === 270);
        const move = (ev)=>{
          // 화면에 보이는(회전 후) 크기 기준으로 계산 → 회전돼도 항상 오른쪽 아래를 드래그하는 느낌
          const visualW = Math.max(20, startW + (ev.clientX-startX));
          const visualH = Math.max(16, startH + (ev.clientY-startY));
          const localW = swapped ? visualH : visualW;
          const localH = swapped ? visualW : visualH;
          lbl.widthPct = localW/stageRect.width*100;
          lbl.heightPct = localH/stageRect.height*100;
          labelEl.style.width = localW+'px';
          labelEl.style.height = localH+'px';
          labelEl.style.overflow = 'hidden';
        };
        const up = ()=>{ window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); redrawCurrentPhoto_(); };
        window.addEventListener('pointermove', move);
        window.addEventListener('pointerup', up);
      });
      wrap.appendChild(resizeHandle);
    }
  });
}

function changeLabelFontSize(li, delta){
  const g = games.find(x=>x.id===currentGameId);
  const photo = g.photos[currentPhotoIdx];
  const lbl = photo.labels[li];
  lbl.fontSize = Math.max(8, Math.min(48, (lbl.fontSize||14) + delta*2));
  redrawCurrentPhoto_();
}
function rotateLabel(li){
  const g = games.find(x=>x.id===currentGameId);
  const photo = g.photos[currentPhotoIdx];
  const lbl = photo.labels[li];
  lbl.rotation = ((lbl.rotation||0) + 90) % 360;
  redrawCurrentPhoto_();
}
function deleteLabel(li){
  const g = games.find(x=>x.id===currentGameId);
  const photo = g.photos[currentPhotoIdx];
  photo.labels.splice(li, 1);
  redrawCurrentPhoto_();
}

async function resolvePhotoUrl_(storagePath){
  if (photoUrlCache[storagePath]) return photoUrlCache[storagePath];
  const url = await getDownloadURL(ref(storage, storagePath));
  photoUrlCache[storagePath] = url;
  return url;
}

function prevPhoto(){ currentPhotoIdx = Math.max(0, currentPhotoIdx-1); renderPhotoTab(); }
function nextPhoto(){
  const g = games.find(x=>x.id===currentGameId);
  currentPhotoIdx = Math.min((g.photos||[]).length-1, currentPhotoIdx+1);
  renderPhotoTab();
}

function uploadPhoto(){
  const input = document.getElementById('photoFileInput');
  const file = input.files[0];
  if (!file){ alert('파일을 선택해주세요.'); return; }
  openCropModal_(file);
}

/**
 * ============================================================
 * 사진 자르기 · 회전 (업로드 전 편집)
 * ============================================================
 */
let cropState_ = null;

function openCropModal_(file){
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = ()=>{
    cropState_ = { originalImg: img, img, rotation: 0, fileName: file.name };
    renderCropModal_();
  };
  img.src = url;
}

function renderCropModal_(){
  const old = document.getElementById('cropBackdrop');
  if (old) old.remove();

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.id = 'cropBackdrop';
  backdrop.innerHTML = `
    <div class="modal">
      <h3>사진 자르기 · 회전</h3>
      <div class="crop-toolbar">
        <button onclick="rotateCrop_(-90)">↺ 왼쪽으로 회전</button>
        <button onclick="rotateCrop_(90)">회전 ↻ 오른쪽으로</button>
      </div>
      <div class="crop-canvas-wrap" id="cropCanvasWrap">
        <canvas id="cropCanvas"></canvas>
        <div class="crop-box" id="cropBox"><div class="crop-handle" id="cropHandle"></div></div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeCropModal_()">취소</button>
        <button class="btn-apply" onclick="applyCropAndUpload_()">적용하고 업로드</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  setupCropCanvas_();
}

function setupCropCanvas_(){
  const wrap = document.getElementById('cropCanvasWrap');
  const canvas = document.getElementById('cropCanvas');
  const box = document.getElementById('cropBox');
  const handle = document.getElementById('cropHandle');

  const img = cropState_.img;
  const ctx = canvas.getContext('2d');
  canvas.width = img.width;
  canvas.height = img.height;
  ctx.drawImage(img, 0, 0);

  // 사진 원래 비율 그대로 미리보기 높이를 맞춥니다. (고정된 4:3 틀에 늘려 넣으면
  // 미리보기가 눌리거나 늘어나 보이고, 그 상태로 계산한 크롭 좌표도 같이 어긋납니다)
  const wrapWidth = wrap.clientWidth;
  wrap.style.height = (wrapWidth * img.height / img.width) + 'px';

  // 처음에는 크롭 박스가 전체 이미지를 덮도록 초기화
  const rect = wrap.getBoundingClientRect();
  cropState_.box = { x: 0, y: 0, w: rect.width, h: rect.height };
  applyBoxStyle_();

  box.onpointerdown = (e)=>{
    if (e.target === handle) return;
    const startX = e.clientX, startY = e.clientY;
    const start = { ...cropState_.box };
    const move = (ev)=>{
      const wrapRect = wrap.getBoundingClientRect();
      let x = start.x + (ev.clientX - startX);
      let y = start.y + (ev.clientY - startY);
      x = Math.max(0, Math.min(wrapRect.width - cropState_.box.w, x));
      y = Math.max(0, Math.min(wrapRect.height - cropState_.box.h, y));
      cropState_.box.x = x; cropState_.box.y = y;
      applyBoxStyle_();
    };
    const up = ()=>{ window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  handle.onpointerdown = (e)=>{
    e.stopPropagation();
    const startX = e.clientX, startY = e.clientY;
    const start = { ...cropState_.box };
    const move = (ev)=>{
      const wrapRect = wrap.getBoundingClientRect();
      let w = Math.max(30, Math.min(wrapRect.width - start.x, start.w + (ev.clientX - startX)));
      let h = Math.max(30, Math.min(wrapRect.height - start.y, start.h + (ev.clientY - startY)));
      cropState_.box.w = w; cropState_.box.h = h;
      applyBoxStyle_();
    };
    const up = ()=>{ window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
}

function applyBoxStyle_(){
  const box = document.getElementById('cropBox');
  const { x, y, w, h } = cropState_.box;
  box.style.left = x+'px'; box.style.top = y+'px';
  box.style.width = w+'px'; box.style.height = h+'px';
}

function rotateCrop_(deltaDeg){
  const { originalImg } = cropState_;
  cropState_.rotation = ((cropState_.rotation || 0) + deltaDeg + 360) % 360;
  const rot = cropState_.rotation;
  const swapped = (rot === 90 || rot === 270);

  const rotatedCanvas = document.createElement('canvas');
  rotatedCanvas.width = swapped ? originalImg.height : originalImg.width;
  rotatedCanvas.height = swapped ? originalImg.width : originalImg.height;
  const rctx = rotatedCanvas.getContext('2d');
  rctx.save();
  rctx.translate(rotatedCanvas.width/2, rotatedCanvas.height/2);
  rctx.rotate(rot * Math.PI/180);
  rctx.drawImage(originalImg, -originalImg.width/2, -originalImg.height/2);
  rctx.restore();

  cropState_.img = rotatedCanvas;
  setupCropCanvas_(); // 회전된 이미지 기준으로 캔버스와 크롭 박스를 다시 초기화
}

function closeCropModal_(){
  const el = document.getElementById('cropBackdrop');
  if (el) el.remove();
  cropState_ = null;
}

async function applyCropAndUpload_(){
  const wrap = document.getElementById('cropCanvasWrap');
  const wrapRect = wrap.getBoundingClientRect();
  const img = cropState_.img; // 캔버스(회전됐으면) 또는 이미지(회전 안 했으면) - 둘 다 drawImage 가능
  const scale = img.width / wrapRect.width; // 화면 표시 크기 → 실제 이미지 픽셀 크기 비율

  const { x, y, w, h } = cropState_.box;
  const sx = x*scale, sy = y*scale, sw = w*scale, sh = h*scale;

  const outCanvas = document.createElement('canvas');
  outCanvas.width = sw; outCanvas.height = sh;
  outCanvas.getContext('2d').drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);

  const blob = await new Promise(res => outCanvas.toBlob(res, 'image/jpeg', 0.9));
  closeCropModal_();

  const statusEl = document.getElementById('uploadStatus');
  if (statusEl) statusEl.textContent = '업로드 중...';

  const g = games.find(x=>x.id===currentGameId);
  const storagePath = `games/${g.id}/${Date.now()}_cropped.jpg`;
  try{
    await uploadBytes(ref(storage, storagePath), blob);
    g.photos = g.photos || [];
    g.photos.push({ storagePath, markers: [] });
    currentPhotoIdx = g.photos.length - 1;
    await persistGame_(g);
    renderPhotoTab();
  }catch(e){
    console.error(e);
    alert('업로드에 실패했습니다.');
  }
}

async function deletePhoto(){
  if (!confirm('이 사진을 삭제할까요? (마커 정보도 함께 삭제됩니다)')) return;
  const g = games.find(x=>x.id===currentGameId);
  g.photos.splice(currentPhotoIdx, 1);
  currentPhotoIdx = 0;
  await persistGame_(g);
  renderPhotoTab();
}

/** 사진/마커 변경사항은 즉시 저장합니다 (표 탭의 케이스 편집은 "저장" 버튼으로 별도 처리) */
async function persistGame_(g){
  const { id, ...data } = g;
  data.updatedAt = Date.now();
  await updateDoc(doc(db, 'games', id), data);
}

// ---- 표 탭 ----
function renderTableTab(){
  const g = games.find(x=>x.id===currentGameId);
  const editable = currentRole === 'editor';
  const cases = g.cases || [];
  const body = document.getElementById('tabBody');

  let rows = '';
  cases.forEach((c, ci) => {
    (c.items||[{name:'',qty:1}]).forEach((it, ii) => {
      rows += `<tr>`;
      if (ii === 0){
        rows += `<td rowspan="${(c.items||[{}]).length}">
          ${editable
            ? `<select onchange="updateCaseType(${ci}, this.value)">${CASE_TYPES.map(t=>`<option value="${t}" ${t===c.caseType?'selected':''}>${t}</option>`).join('')}</select>`
            : `<span class="case-badge case-${c.caseType}">${c.caseType}</span>`}
        </td>`;
      }
      rows += `<td>${editable ? `<input value="${it.name||''}" onchange="updateItem(${ci},${ii},'name',this.value)">` : (it.name||'')}</td>`;
      rows += `<td style="width:80px;">${editable ? `<input type="number" value="${it.qty||0}" onchange="updateItem(${ci},${ii},'qty',this.value)">` : (it.qty||0)}</td>`;
      if (editable) rows += `<td style="width:40px;"><button class="btn btn-ghost2" style="padding:4px 8px; width:auto;" onclick="deleteItem(${ci},${ii})">✕</button></td>`;
      rows += `</tr>`;
    });
  });

  body.innerHTML = `
    <table class="case-table">
      <thead><tr><th>케이스</th><th>구성품</th><th>수량</th>${editable?'<th></th>':''}</tr></thead>
      <tbody>${rows || `<tr><td colspan="4" style="color:var(--ink-soft);">등록된 케이스가 없습니다.</td></tr>`}</tbody>
    </table>
    ${editable ? `
      <div style="margin-top:14px;">
        <button class="btn btn-ghost2" style="width:auto;" onclick="addCase()">+ 케이스 추가</button>
      </div>
    ` : ''}
  `;
}

function addCase(){
  const g = games.find(x=>x.id===currentGameId);
  g.cases = g.cases || [];
  g.cases.push({ caseType:'A', items:[{name:'새 구성품', qty:1}] });
  renderTableTab();
}
function updateCaseType(ci, val){
  const g = games.find(x=>x.id===currentGameId);
  g.cases[ci].caseType = val;
}
function updateItem(ci, ii, field, val){
  const g = games.find(x=>x.id===currentGameId);
  g.cases[ci].items[ii][field] = field === 'qty' ? Number(val) : val;
}
function deleteItem(ci, ii){
  const g = games.find(x=>x.id===currentGameId);
  g.cases[ci].items.splice(ii, 1);
  if (g.cases[ci].items.length === 0) g.cases.splice(ci, 1);
  renderTableTab();
}

async function saveGame(){
  const g = games.find(x=>x.id===currentGameId);
  // 사진 탭에서 마커를 옮겼을 수도 있으니, 표 저장 시에도 전체를 같이 저장합니다.
  await persistGame_(g);
  alert('저장되었습니다.');
}

// 전역에 노출 (onclick에서 호출하기 위함 - type="module"은 기본적으로 전역 스코프가 아니라서 필요)
Object.assign(window, {
  renderList, openGame, createNewGame, switchMode,
  prevPhoto, nextPhoto, uploadPhoto, deletePhoto,
  addCase, updateCaseType, updateItem, deleteItem, saveGame, doLogout,
  updateMarkerCaseType, updateMarkerItem, addMarkerItem, deleteMarkerItem, removeMarkerCase,
  createLabelFromMarker, changeLabelFontSize, rotateLabel, deleteLabel,
  rotateCrop_, closeCropModal_, applyCropAndUpload_
});

// ============================================================
// 로그인 상태 감시
// ============================================================
onAuthStateChanged(auth, (user)=>{
  if (user) checkAccessAndRender(user);
  else renderLoginButton();
});
</script>
